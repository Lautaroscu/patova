name: Patova
options:
  bundleIdPrefix: com.patova.app
  xcodeVersion: "26.6"
targets:
  Patova:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: .
        excludes:
          - "CallDirectoryHandler.swift"
          - "project.yml"
          - "*.entitlements"
          - "README_XCODE.md"
          - "*.zip"
          - ".xcodegen"
          - "xcodegen_tmp"
          - "*-Info.plist"
          - ".git/"
          - "build/"
          - ".gitignore"
          - "errores.txt"
          - "Patova.xcodeproj"
          - "ci_scripts"
          - "*.xcodeproj"
    info:
      path: Patova-Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.serra.app.patova
      DEVELOPMENT_TEAM: "2AHHY43UG2"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: Patova.entitlements
    dependencies:
      - target: CallDirectory

  CallDirectory:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - CallDirectoryHandler.swift
      - DatabaseManager.swift
    info:
      path: CallDirectory-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.callkit.call-directory
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).CallDirectoryHandler
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.serra.app.patova.CallDirectory
      DEVELOPMENT_TEAM: "2AHHY43UG2"
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_ENTITLEMENTS: CallDirectory.entitlements

schemes:
  Patova:
    build:
      targets:
        Patova: all
      parallelizeBuild: true
    run:
      config: Debug
    archive:
      config: Release
    profile:
      config: Release
    analyze:
      config: Debug
