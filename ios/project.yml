name: Patova
options:
  bundleIdPrefix: agency.serra
targets:
  Patova:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: .
        excludes:
          - "CallDirectoryHandler.swift"
          - "project.yml"
          - "*.entitlements"
          - "README_XCODE.md"
    settings:
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      PRODUCT_BUNDLE_IDENTIFIER: agency.serra.patova
      DEVELOPMENT_TEAM: "" # Dejar vacío para firma automática o configurar el Team ID del desarrollador
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Patova.entitlements
      properties:
        com.apple.security.application-groups:
          - group.agency.serra.patova
    dependencies:
      - target: CallDirectory

  CallDirectory:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: CallDirectoryHandler.swift
      - path: DatabaseManager.swift
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: agency.serra.patova.CallDirectory
      DEVELOPMENT_TEAM: ""
      INFOPLIST_KEY_NSExtension:
        NSExtensionPointIdentifier: com.apple.callkit.call-directory
        NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).CallDirectoryHandler
    entitlements:
      path: CallDirectory.entitlements
      properties:
        com.apple.security.application-groups:
          - group.agency.serra.patova
