name: Patova
options:
  bundleIdPrefix: agency.serra
  xcodeVersion: "13.0"
targets:
  Patova:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: .
        excludes:
          - "CallDirectoryHandler.swift"
          - "project.yml"
          - "*.entitlements"
          - "README_XCODE.md"
    settings:
      INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
      PRODUCT_BUNDLE_IDENTIFIER: agency.serra.patova
      DEVELOPMENT_TEAM: "" # Dejar vacío para firma automática o configurar el Team ID del desarrollador
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_ENTITLEMENTS: Patova.entitlements
    dependencies:
      - target: CallDirectory

  CallDirectory:
    type: app-extension
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - CallDirectoryHandler.swift
      - DatabaseManager.swift
    info:
      path: CallDirectory-Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: agency.serra.patova.CallDirectory
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_ENTITLEMENTS: CallDirectory.entitlements
