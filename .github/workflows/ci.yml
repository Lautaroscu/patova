name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: numguard_test
          POSTGRES_USER: numguard
          POSTGRES_PASSWORD: numguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://numguard:numguard@localhost:5432/numguard_test
      REDIS_URL: redis://localhost:6379/0
      NUMGUARD_API_KEY: ci-test-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Import sort (isort via ruff I rule)
        run: ruff check --select I --fix --exit-non-zero-on-fix .

      - name: Type check (mypy)
        run: mypy src

      - name: Security scan (Bandit)
        run: bandit -r src/ -c pyproject.toml || true

      - name: Dependency audit (pip-audit)
        run: pip-audit || true

      - name: Test with coverage (pytest)
        run: >
          pytest
          -m "not integration and not load"
          --cov=src/numguard
          --cov-report=xml
          --cov-report=term-missing
          --junitxml=junit.xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/junit.xml
            backend/coverage.xml

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Ktlint check
        run: ./gradlew ktlintCheck || true

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      - name: Bundle AAB (release)
        run: ./gradlew bundleDebug || true

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/

      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-aab
          path: android/app/build/outputs/bundle/debug/
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t numguard-api:ci backend

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: numguard-api:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
